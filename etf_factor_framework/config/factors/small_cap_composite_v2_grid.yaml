factor:
  class: factors.fundamental.value.small_cap_composite_v2.SmallCapCompositeV2
  direction: 1   # 因子值越大越好
  params:
    mc_floor: 10.0           # 市值下限 10亿
    mc_cap: 200.0            # 市值上限 200亿
    roe_floor: -0.20         # ROE(TTM) ≥ -20%（与 v1 一致，宽松）
    debt_ceiling: 0.90       # 资产负债率 ≤ 90%（与 v1 一致，宽松）
    # gpm_floor: null        # 毛利率不过滤（仅参与 quality_score）
    # cfni_floor: null       # 现金流质量不过滤（仅参与 quality_score）
    turnover_floor: 0.005    # 换手率20日均值 ≥ 0.5%（小数！lixinger to_r 单位为小数）
    turnover_window: 20      # 换手率滚动窗口（交易日）
    quality_alpha: 0.3       # quality_score 权重（0=纯小市值, 正值=叠加质量）
    max_per_industry: 3      # 每行业最多候选股数量（行业分散约束）

backtest:
  start_date: "2016-01-01"
  end_date: "2026-01-01"
  filter_mainboard_only: true      # 只保留主板
  filter_new_stock_days: 365       # 排除次新股
  skip_leakage_check: true         # mc/换手率为日频，无季报延迟

grid:
  neutralization_methods: [raw]    # 不中性化，保留市值暴露
  top_k_list: [10, 20]
  rebalance_freqs: [5, 10]

storage:
  eval_db_path: "../factor_eval_result/factor_eval.db"

benchmarks: [csi300, csi500, csi2000]
