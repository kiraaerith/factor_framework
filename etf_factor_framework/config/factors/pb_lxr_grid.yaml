factor:
  class: factors.fundamental.value.pb_lxr.PB_LXR
  direction: -1

backtest:
  start_date: "2016-01-01"
  end_date: "2025-12-31"
  # filter_mainboard_only: true  # default true; set false to include all boards (ChiNext/STAR/BSE/B-shares)
  # filter_new_stock_days: 365   # default 365; exclude stocks listed < N days from factor; 0 to disable

grid:
  neutralization_methods: [raw, size]
  top_k_list: [20, 50]
  rebalance_freqs: [5, 20, 60]

storage:
  eval_db_path: "../factor_eval_result/factor_eval.db"
