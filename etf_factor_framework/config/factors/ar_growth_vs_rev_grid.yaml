factor:
  class: factors.fundamental.efficiency.ar_growth_vs_rev.ARGrowthVsRev
  direction: -1
  params:
    lag: 250
    extreme_clip: 10.0

backtest:
  start_date: "2016-01-01"
  end_date: "2025-12-31"
  skip_leakage_check: false

grid:
  neutralization_methods: [raw, size]
  top_k_list: [20, 50]
  rebalance_freqs: [5, 20, 60]

storage:
  eval_db_path: "../factor_eval_result/factor_eval.db"
